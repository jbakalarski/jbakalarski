name: generate animation

on:
  # Run once daily at midnight UTC.
  schedule:
    - cron: "0 0 * * *"
  
  # Allow manual runs when the animation needs to be refreshed immediately.
  workflow_dispatch:

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generate snake animations from the repository owner's contribution graph.
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23cf16f0
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23cf16f0
          
          
      # Publish the generated SVG files to the output branch.
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
